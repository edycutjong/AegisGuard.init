services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: aegis_anvil
    ports:
      - "8545:8545"
    command: anvil --host 0.0.0.0

  backend:
    build:
      context: ./backend
    container_name: aegis_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    volumes:
      - ./backend:/app
    depends_on:
      - anvil

  frontend:
    build:
      context: ./frontend
    container_name: aegis_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
