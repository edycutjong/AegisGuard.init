services:
  db:
    image: postgres:15-alpine
    container_name: aegis_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: aegis
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aegis"]
      interval: 5s
      timeout: 5s
      retries: 5

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: aegis_anvil
    ports:
      - "8545:8545"
    command: anvil --host 0.0.0.0

  backend:
    build:
      context: ./backend
    container_name: aegis_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/aegis
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      anvil:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: aegis_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
